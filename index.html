<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilities</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="brand" data-i18n="brand">Utilities</div>
  <div class="nav-links">
    <a class="nav-link" data-src="Dices/DiceCalculator.html" onclick="navigate(this)" data-i18n-title="nav_dice" title="Dice Calculator">&#x1F3B2;</a>
    <a class="nav-link" data-src="ColorPicker/ColorPicker.html" onclick="navigate(this)" data-i18n-title="nav_color" title="Color Picker">&#x1F3A8;</a>
    <a class="nav-link" data-src="JSONVisualizer/JSONVisualizer.html" onclick="navigate(this)" data-i18n-title="nav_json" title="JSON Visualizer"><span style="position:relative;top:-2px">{ }</span></a>
    <a class="nav-link" data-src="DayInfo/DayInfo.html" onclick="navigate(this)" data-i18n-title="nav_dayinfo" title="Day Info">&#x1F4C5;</a>
  </div>
  <button class="settings-btn" id="settingsBtn" aria-label="Settings">&#x2699;</button>
</nav>

<div class="settings-overlay" id="settingsOverlay">
  <div class="settings-panel" id="settingsPanel">
    <div class="settings-title" data-i18n="settings">Settings</div>
    <div class="settings-group">
      <div class="settings-label" data-i18n="settings_lang">Language</div>
      <select class="settings-select" id="langSelect">
        <option value="en" data-i18n="lang_en">English</option>
        <option value="ko" data-i18n="lang_ko">Korean</option>
        <option value="jp" data-i18n="lang_jp">Japanese</option>
      </select>
    </div>
    <div class="settings-group">
      <div class="settings-label" data-i18n="settings_defaultpage">Default Page</div>
      <select class="settings-select" id="defaultPageSelect">
        <option value="" data-i18n="page_last">Last visited page</option>
        <option value="Dices/DiceCalculator.html" data-i18n="page_dice">Dice Calculator</option>
        <option value="ColorPicker/ColorPicker.html" data-i18n="page_color">Color Picker</option>
        <option value="JSONVisualizer/JSONVisualizer.html" data-i18n="page_json">JSON Visualizer</option>
        <option value="DayInfo/DayInfo.html" data-i18n="page_dayinfo">Day Info</option>
      </select>
    </div>
  </div>
</div>

<iframe id="content"></iframe>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@5/dist/fp.min.js"></script>
<script src="i18n.js"></script>
<script src="index_lang.js"></script>
<script src="settings.js"></script>
<script src="script.js"></script>
<script>
Settings.ready.then(function() {
  var lang = Settings.get('lang') || 'en';
  document.documentElement.lang = lang === 'jp' ? 'ja' : lang;

  /* ── Settings panel toggle ── */
  var overlay = document.getElementById('settingsOverlay');
  document.getElementById('settingsBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    overlay.classList.toggle('open');
  });
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.classList.remove('open');
  });

  /* ── Language ── */
  var langSel = document.getElementById('langSelect');
  langSel.value = lang;

  langSel.addEventListener('change', function() {
    var newLang = this.value;
    Settings.set('lang', newLang).then(function() {
      document.documentElement.lang = newLang === 'jp' ? 'ja' : newLang;
      I18N.setLang(newLang);
      var iframe = document.getElementById('content');
      var active = document.querySelector('.nav-link.active');
      var base = active ? active.dataset.src : 'Dices/DiceCalculator.html';
      iframe.src = base + '?lang=' + newLang;
    });
  });

  /* ── Default page ── */
  var dpSel = document.getElementById('defaultPageSelect');
  var savedDefault = Settings.get('defaultpage') || '';
  dpSel.value = savedDefault;

  dpSel.addEventListener('change', function() {
    Settings.set('defaultpage', this.value);
  });

  /* ── Initial page load ── */
  var defaultpage = Settings.get('defaultpage');
  var page;
  if (defaultpage) {
    page = defaultpage; // specific page set
  } else {
    page = Settings.get('lastpage') || 'Dices/DiceCalculator.html'; // last visited
  }
  var match = document.querySelector('.nav-link[data-src="' + page + '"]');
  if (!match) { page = 'Dices/DiceCalculator.html'; match = document.querySelector('.nav-link[data-src="' + page + '"]'); }
  if (match) {
    document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
    match.classList.add('active');
  }
  document.getElementById('content').src = page + '?lang=' + lang;
});
</script>

</body>
</html>

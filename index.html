<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workspace</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
  }
  nav {
    display: flex;
    align-items: center;
    background: #1d1d1f;
    padding: 0 1.5rem;
    height: 48px;
    flex-shrink: 0;
  }
  nav .brand {
    color: #f5f5f7;
    font-weight: 700;
    font-size: 1rem;
    margin-right: 2rem;
    letter-spacing: 0.02em;
  }
  nav .nav-links {
    display: flex;
    gap: 0;
    height: 100%;
  }
  nav .nav-link {
    display: flex;
    align-items: center;
    padding: 0 1.25rem;
    color: #a1a1a6;
    font-size: 0.875rem;
    font-weight: 500;
    text-decoration: none;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: color 0.2s, border-color 0.2s;
    user-select: none;
  }
  nav .nav-link:hover {
    color: #f5f5f7;
  }
  nav .nav-link.active {
    color: #f5f5f7;
    border-bottom-color: #0071e3;
  }
  iframe {
    flex: 1;
    width: 100%;
    border: none;
  }
</style>
</head>
<body>

<nav>
  <div class="brand">Workspace</div>
  <div class="nav-links">
    <a class="nav-link active" data-src="Dices.html" onclick="navigate(this)">Dice Calculator</a>
    <a class="nav-link" data-src="color-picker.html" onclick="navigate(this)">Color Picker</a>
  </div>
</nav>

<iframe id="content" src="Dices.html"></iframe>

<script>
function navigate(el) {
  document.querySelectorAll('.nav-link').forEach(a => a.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('content').src = el.dataset.src;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilities</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <div class="brand" data-i18n="brand">Utilities</div>
  <div class="nav-links">
    <a class="nav-link" data-src="Dices/DiceCalculator.html" onclick="navigate(this)" data-i18n-title="nav_dice" title="Dice Calculator">&#x1F3B2;</a>
    <a class="nav-link" data-src="ColorPicker/ColorPicker.html" onclick="navigate(this)" data-i18n-title="nav_color" title="Color Picker">&#x1F3A8;</a>
    <a class="nav-link" data-src="JSONVisualizer/JSONVisualizer.html" onclick="navigate(this)" data-i18n-title="nav_json" title="JSON Visualizer"><span style="position:relative;top:-2px">{ }</span></a>
    <a class="nav-link" data-src="DayInfo/DayInfo.html" onclick="navigate(this)" data-i18n-title="nav_dayinfo" title="Day Info">&#x1F4C5;</a>
  </div>
  <select id="langSelect" class="lang-select" aria-label="Language">
    <option value="en">EN</option>
    <option value="ko">KO</option>
    <option value="jp">JP</option>
  </select>
</nav>

<iframe id="content"></iframe>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@5/dist/fp.min.js"></script>
<script src="i18n.js"></script>
<script src="index_lang.js"></script>
<script src="settings.js"></script>
<script src="script.js"></script>
<script>
Settings.ready.then(function() {
  var sel = document.getElementById('langSelect');
  var lang = Settings.get('lang') || 'en';
  sel.value = lang;
  document.documentElement.lang = lang === 'jp' ? 'ja' : lang;

  // Load initial page: defaultpage > lastpage > DiceCalculator
  var page = Settings.get('defaultpage') || Settings.get('lastpage') || 'Dices/DiceCalculator.html';
  var match = document.querySelector('.nav-link[data-src="' + page + '"]');
  if (!match) { page = 'Dices/DiceCalculator.html'; match = document.querySelector('.nav-link[data-src="' + page + '"]'); }
  if (match) {
    document.querySelectorAll('.nav-link').forEach(function(a) { a.classList.remove('active'); });
    match.classList.add('active');
  }
  document.getElementById('content').src = page + '?lang=' + lang;

  sel.addEventListener('change', function() {
    var newLang = this.value;
    Settings.set('lang', newLang).then(function() {
      document.documentElement.lang = newLang === 'jp' ? 'ja' : newLang;
      I18N.setLang(newLang);
      var iframe = document.getElementById('content');
      var active = document.querySelector('.nav-link.active');
      var base = active ? active.dataset.src : 'Dices/DiceCalculator.html';
      iframe.src = base + '?lang=' + newLang;
    });
  });
});
</script>

</body>
</html>

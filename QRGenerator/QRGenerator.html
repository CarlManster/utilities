<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<link rel="stylesheet" href="QRGenerator.css">
</head>
<body>

<div class="layout">
  <main class="container" data-i18n-aria="aria_main" aria-label="QR code generator">
    <h1 data-i18n="title">QR Code Generator</h1>
    <p class="subtitle" data-i18n="subtitle">Type text to automatically generate a QR code</p>

    <div class="qr-area" id="qrArea" role="img" data-i18n-aria="aria_qr_area_empty" aria-label="QR code preview (empty)">
      <div class="qr-placeholder" id="qrPlaceholder" data-i18n="qr_placeholder">Enter text below</div>
    </div>

    <div class="download-row" role="group" data-i18n-aria="aria_download_group" aria-label="Download QR code">
      <span class="download-label" data-i18n="download_label">DOWNLOAD</span>
      <div class="download-controls">
        <div class="theme-toggle" id="downloadThemeToggle" role="radiogroup" data-i18n-aria="aria_download_theme" aria-label="Download color theme">
          <button type="button" class="theme-btn" data-theme="light" role="radio" aria-checked="true" data-i18n="theme_light">Light</button>
          <button type="button" class="theme-btn" data-theme="dark" role="radio" aria-checked="false" data-i18n="theme_dark">Dark</button>
        </div>
        <div class="download-buttons">
          <button type="button" class="download-btn" id="downloadPngBtn" data-i18n-aria="aria_download_png" aria-label="Download as PNG" disabled>PNG</button>
          <button type="button" class="download-btn" id="downloadJpgBtn" data-i18n-aria="aria_download_jpg" aria-label="Download as JPG" disabled>JPG</button>
          <button type="button" class="download-btn" id="downloadSvgBtn" data-i18n-aria="aria_download_svg" aria-label="Download as SVG" disabled>SVG</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-header">
        <label for="qrInput" data-i18n="text_label">TEXT</label>
        <span class="char-count" id="charCount" aria-live="polite" data-i18n-aria="aria_char_count" aria-label="Character count">0</span>
      </div>
      <div class="input-row">
        <textarea id="qrInput" data-i18n-placeholder="input_placeholder" placeholder="Enter a URL or text..." spellcheck="false" maxlength="5596" aria-describedby="qrError qrShortcutHint"></textarea>
        <button type="button" id="saveBtn" class="save-btn" data-i18n="save_btn" data-i18n-aria="aria_save_btn" aria-label="Save current text to recent list" aria-keyshortcuts="Control+Enter Meta+Enter" disabled>Save</button>
      </div>
      <div class="error" id="qrError" role="alert" aria-live="assertive"></div>
      <div id="qrShortcutHint" class="sr-only" data-i18n="hint_save_shortcut">Press Control or Command plus Enter to save.</div>
    </div>
  </main>

  <aside class="recent-panel" data-i18n-aria="aria_recent_panel" aria-label="Recent QR codes">
    <h2 data-i18n="recent_title">Recent</h2>
    <ul class="recent-list" id="recentList"></ul>
  </aside>
</div>

<div id="srStatus" class="sr-only" aria-live="polite" aria-atomic="true"></div>

<script src="../i18n.js"></script>
<script src="QRGenerator_lang.js"></script>
<script src="../settings.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="QRGenerator.js"></script>

</body>
</html>

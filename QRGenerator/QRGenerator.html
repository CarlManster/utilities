<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code Generator</title>
<link rel="stylesheet" href="QRGenerator.css">
</head>
<body>

<div class="container">
  <h1 data-i18n="title">QR Code Generator</h1>
  <p class="subtitle" data-i18n="subtitle">Type text to automatically generate a QR code</p>

  <div class="qr-area" id="qrArea">
    <div class="qr-placeholder" id="qrPlaceholder" data-i18n="qr_placeholder">Enter text below</div>
  </div>

  <div class="input-area">
    <div class="input-header">
      <label for="qrInput" data-i18n="text_label">TEXT</label>
      <span class="char-count" id="charCount">0</span>
    </div>
    <textarea id="qrInput" data-i18n-placeholder="input_placeholder" placeholder="Enter a URL or text..." spellcheck="false"></textarea>
    <div class="error" id="qrError"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@5/dist/fp.min.js"></script>
<script src="../i18n.js"></script>
<script src="QRGenerator_lang.js"></script>
<script src="../settings.js"></script>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
<script src="QRGenerator.js"></script>

</body>
</html>

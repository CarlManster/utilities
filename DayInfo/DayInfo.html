<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day Info</title>
<link rel="stylesheet" href="DayInfo.css">
</head>
<body>

<div class="container">
  <header class="header-row">
    <div>
      <h1 data-i18n="title">Day Info</h1>
      <p class="subtitle" data-i18n="subtitle">Solar / Lunar calendar conversion & holidays</p>
    </div>
    <button type="button" id="btnApiKey" class="btn-key" data-i18n-aria="aria_api_key" aria-label="API service key settings" data-i18n="api_key">API Key</button>
  </header>

  <div class="input-bar" role="group" data-i18n-aria="aria_date_input" aria-label="Date input">
    <div class="input-field">
      <label for="calType" data-i18n="calendar">Calendar</label>
      <select id="calType" data-i18n-aria="aria_calendar_type" aria-label="Calendar type">
        <option value="solar" data-i18n="solar">Solar</option>
        <option value="lunar" data-i18n="lunar">Lunar</option>
      </select>
    </div>
    <div class="input-field">
      <label for="yearInput" data-i18n="year">Year</label>
      <input type="number" id="yearInput" data-i18n-aria="aria_year" aria-label="Year">
    </div>
    <div class="input-field">
      <label for="monthSelect" data-i18n="month">Month</label>
      <select id="monthSelect" data-i18n-aria="aria_month" aria-label="Month"></select>
    </div>
    <div class="input-field">
      <label for="daySelect" data-i18n="day">Day</label>
      <select id="daySelect" data-i18n-aria="aria_day" aria-label="Day"></select>
    </div>
    <div class="input-field">
      <label for="tzSelect" data-i18n="timezone">Timezone</label>
      <select id="tzSelect" data-i18n-aria="aria_timezone" aria-label="Timezone"></select>
    </div>
    <div class="input-field">
      <label for="weekCount" data-i18n="week_count">WeekCount</label>
      <select id="weekCount" data-i18n-aria="aria_week_count" aria-label="Week count">
        <option value="3" data-i18n="week_3">3 week</option>
        <option value="5" data-i18n="week_5">5 week</option>
        <option value="7" data-i18n="week_7">7 week</option>
      </select>
    </div>
    <div class="input-field leap-field" id="leapField" hidden>
      <label for="leapCheck">
        <input type="checkbox" id="leapCheck" data-i18n-aria="aria_leap_month" aria-label="Leap month">
        <span data-i18n="leap">Leap</span>
      </label>
    </div>
    <div class="nav-buttons" role="group" data-i18n-aria="aria_date_nav" aria-label="Date navigation">
      <button type="button" id="btnPrevWeek" data-i18n-aria="aria_prev_week" aria-label="Previous week">&lt;&lt;</button>
      <button type="button" id="btnPrev" data-i18n-aria="aria_prev_day" aria-label="Previous day">&lt;</button>
      <button type="button" id="btnToday" data-i18n-aria="aria_go_today" aria-label="Go to today" data-i18n="today">Today</button>
      <button type="button" id="btnNext" data-i18n-aria="aria_next_day" aria-label="Next day">&gt;</button>
      <button type="button" id="btnNextWeek" data-i18n-aria="aria_next_week" aria-label="Next week">&gt;&gt;</button>
    </div>
    <div class="epoch-row">
      <label for="epochInput" data-i18n="epoch">Epoch</label>
      <input type="text" id="epochInput" inputmode="numeric" data-i18n-placeholder="epoch_placeholder" placeholder="e.g. 1744473600" data-i18n-aria="aria_epoch" aria-label="Epoch timestamp">
      <button type="button" id="btnEpochGo" data-i18n-aria="aria_apply_epoch" aria-label="Apply epoch" data-i18n="go">Go</button>
      <div class="epoch-error" id="epochError" hidden></div>
    </div>
  </div>

  <div class="info-banner" id="infoBanner" role="alert" hidden></div>

  <section class="week-section" data-i18n-aria="aria_weekly_calendar" aria-label="Weekly calendar">
    <div class="week-grid" id="weekGrid"></div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="../i18n.js"></script>
<script src="DayInfo_lang.js"></script>
<script src="../settings.js"></script>
<script src="DayInfo.js"></script>
</body>
</html>
